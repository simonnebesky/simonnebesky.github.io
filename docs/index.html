<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/documentation/d1/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to D1 Documentation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 { margin: 0 0 1rem 0; }
        a {
            color: #fff;
            text-decoration: underline;
            font-weight: bold;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            margin-top: 2rem;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>D1 Documentation</h1>
        <div class="spinner"></div>
        <p>Redirecting to documentation...</p>
        <p>If you are not redirected automatically, <a href="/documentation/d1/">click here</a>.</p>
        <footer>Copyright © 2026 THALES. All rights reserved.</footer>
    </div>
<footer style="text-align: center; padding: 20px; margin-top: 40px;
    border-top: 1px solid #e0e0e0; color: #666;">
    <p><strong>Copyright © 2026 THALES. All rights reserved.</strong></p>
</footer>
</body>
</html>
